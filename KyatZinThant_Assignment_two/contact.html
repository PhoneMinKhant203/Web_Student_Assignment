<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Support - Void Gaming</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styling for the cyber-form */
        .form-box {
            background: var(--card-bg);
            padding: 40px;
            border: 1px solid var(--neon-cyan);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--neon-cyan);
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #0a0a0c;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            box-sizing: border-box; /* Important for width alignment */
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">VOID</div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Support</a></li>
    </ul>
</nav>

<main class="container">
    <div style="max-width: 600px; margin: auto;">
        <h2 style="text-align: center; color: var(--neon-purple);">Technical Support Center</h2>
        <p style="text-align: center; margin-bottom: 30px;">Experiencing a glitch in the system? Open a ticket below.</p>

        <div class="form-box">
            <form action="#">
                <label for="player-name">Player Name</label>
                <input type="text" id="player-name" placeholder="Enter your handle" required>

                <label for="email">Neural Link (Email)</label>
                <input type="email" id="email" placeholder="email@address.com" required>

                <label for="issue">Department</label>
                <select id="issue">
                    <option>Technical Issue</option>
                    <option>Game Purchase Support</option>
                    <option>Bug Reporting</option>
                    <option>Partnership Inquiry</option>
                </select>

                <label for="message">Transmission Details</label>
                <textarea id="message" rows="5" placeholder="Describe the situation..."></textarea>

                <button type="submit" class="btn-neon" style="width: 100%; cursor: pointer;">Send Transmission</button>
            </form>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Void Gaming. Developed for the future.</p>
</footer>

</body>
</html>
