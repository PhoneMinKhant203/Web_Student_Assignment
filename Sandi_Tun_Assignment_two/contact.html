<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact Us - Tha Din</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .contact-container {
        max-width: 900px;
        margin: 50px auto;
        background: white;
        display: flex;
        flex-wrap: wrap;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .contact-info {
        background: var(--deep-blue);
        color: white;
        padding: 40px;
        flex: 1;
        min-width: 250px;
      }
      .contact-form-box {
        padding: 40px;
        flex: 2;
        min-width: 300px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">THA DIN</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="hub.html">The Hub</a></li>
        <li><a href="about.html">Our Story</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>

    <div class="contact-container">
      <div class="contact-info">
        <h3>Reach Us</h3>
        <p>Interested in donating books or stocking your crafts?</p>
        <p><strong>Email:</strong> hello@thadin.org</p>
        <p><strong>Phone:</strong> +95 9 876 543 21</p>
        <p><strong>Location:</strong> Main Street, Kalay Myo</p>
      </div>

      <div class="contact-form-box">
        <h3>Send a Message</h3>
        <form action="#">
          <input type="text" placeholder="Your Name" required />
          <input type="email" placeholder="Your Email" required />
          <select>
            <option>Interested in: Buying Crafts</option>
            <option>Interested in: Donating Books</option>
            <option>Interested in: Volunteering</option>
            <option>Other Inquiry</option>
          </select>
          <textarea rows="5" placeholder="Your message here..."></textarea>
          <button
            type="submit"
            class="btn-main"
            style="width: 100%; border: none; cursor: pointer"
          >
            Send Message
          </button>
        </form>
      </div>
    </div>

    <footer>
      <p>Tha Din Hub - Bridging the gap through books and art.</p>
    </footer>
  </body>
</html>
