<main class="container">
    <div style="border: 3px solid var(--ink-black); padding: 30px;">
        <h2>Let's Connect</h2>
        <p>I am always looking for mentors or fellow students to learn with. Please send me a message!</p>
        
        <form action="#">
            <input type="text" placeholder="Your Name" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--ink-black);">
            <input type="email" placeholder="Your Email" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--ink-black);">
            <textarea placeholder="Your message..." rows="5" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--ink-black);"></textarea>
            <button type="submit" class="btn-ink" style="width: 100%; cursor: pointer;">Send Message</button>
        </form>
    </div>
</main>
