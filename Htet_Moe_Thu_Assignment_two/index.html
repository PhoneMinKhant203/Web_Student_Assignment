<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moe Weather | Agricultural Forecast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">MOE.</div>
    <ul>
        <li><a href="index.html" class="active">Dashboard</a></li>
        <li><a href="forecast.html">Weekly</a></li>
        <li><a href="regions.html">Regions</a></li>
        <li><a href="contact.html">Alerts</a></li>
    </ul>
</nav>

<main class="container">
    <div class="glass-card" style="text-align: center;">
        <p style="text-transform: uppercase; letter-spacing: 2px;">Today in Shan State</p>
        <div class="weather-icon">☀️</div>
        <h1 style="font-size: 4rem; margin: 10px 0;">28°C</h1>
        <p>Perfect conditions for harvesting. No rain expected for 48 hours.</p>
        
        <div style="display: flex; justify-content: space-around; margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
            <div>
                <strong>Humidity</strong>
                <p>45%</p>
            </div>
            <div>
                <strong>Wind</strong>
                <p>12 km/h</p>
            </div>
            <div>
                <strong>UV Index</strong>
                <p>High</p>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Moe Weather Myanmar. Supporting our farmers.</p>
</footer>

</body>
</html>
