<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Forecast - Moe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">MOE.</div>
    <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="forecast.html" class="active">Weekly</a></li>

<div class="container">
    <div class="glass-card">
        <h2>7-Day Agricultural Outlook</h2>
        <div class="forecast-grid">
            <div class="day-card">
                <p>Mon</p>
                <div style="font-size: 2rem;">☀️</div>
                <p>29°</p>
            </div>
            <div class="day-card">
                <p>Tue</p>
                <div style="font-size: 2rem;">⛅</div>
                <p>27°</p>
            </div>
            <div class="day-card">
                <p>Wed</p>
                <div style="font-size: 2rem;">🌧️</div>
                <p>24°</p>
            </div>
            <div class="day-card">
                <p>Thu</p>
                <div style="font-size: 2rem;">⛈️</div>
                <p>22°</p>
            </div>
            <div class="day-card">
                <p>Fri</p>
                <div style="font-size: 2rem;">☁️</div>
                <p>25°</p>
            </div>
        </div>
    </div>
</div>
